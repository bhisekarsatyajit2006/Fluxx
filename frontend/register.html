<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Pyrefly Corporate Assessment</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .auth-card {
      width: 100%;
      max-width: 440px;
      padding: 40px;
      text-align: center;
    }
    .auth-header h1 { font-size: 1.8rem; margin-bottom: 10px; }
    .auth-header p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 32px; }
    
    .form-group { text-align: left; margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px; font-weight: 500; }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 0.95rem;
      transition: all 0.2s;
    }
    .form-group input:focus { border-color: var(--accent); outline: none; background: rgba(108,99,255,0.05); }
    
    .auth-footer { margin-top: 24px; font-size: 0.88rem; color: var(--text-muted); }
    .auth-footer a { color: var(--accent-light); text-decoration: none; font-weight: 500; }
    .auth-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <script>window.userEmail = window.userEmail || localStorage.getItem('user_email') || "";</script>
  <canvas id="particles-canvas"></canvas>

  <section class="auth-page">
    <div class="glass-card auth-card fade-up">
      <div class="auth-header">
        <h1>Create Account</h1>
        <p>Join our professional talent network</p>
      </div>

      <form id="register-form">
        <div class="form-group">
          <label for="username">Full Name</label>
          <input type="text" id="username" required placeholder="John Doe"/>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required placeholder="name@company.com"/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="••••••••" minlength="8"/>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width:100%; margin-top:10px;">
          Create Account
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/login.html">Sign In</a>
      </div>
    </div>
  </section>

  <script>
    // Particle background
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
    resize(); window.addEventListener('resize', resize);
    for (let i = 0; i < 40; i++) {
      particles.push({
        x: Math.random() * innerWidth, y: Math.random() * innerHeight,
        vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
        r: Math.random() * 1.5 + 0.5, a: Math.random() * 0.4 + 0.1,
      });
    }
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(108,99,255,${p.a})`; ctx.fill();
      });
      requestAnimationFrame(animate);
    }
    animate();

    // Form logic
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });
        
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Registration failed');
        }
        
        alert('Account created! Please sign in.');
        window.location.href = '/login.html';

      } catch (err) {
        alert(err.message);
      }
    });
  </script>
</body>
</html>
