<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="stylesheet" href="/static/css/style.css"/>

<body>
  <script>window.userEmail = window.userEmail || localStorage.getItem('user_email') || "";</script>
  <!-- existing content retained -->

  <div id="loading-overlay">
      <div class="spinner"></div>
      <h2 style="margin-top:20px;">Fetching Question…</h2>
  </div>

  <div id="result-modal">
      <div class="glass-card result-content">
          <h1 class="gradient-text">Evaluation Complete</h1>
          <div id="ai-feedback" style="margin-top:24px;"></div>
      </div>
  </div>

  <script>
    // Example snippet that uses user_email when submitting
    async function submitSolution(btn, questionId, code) {
        const res = await fetch('/api/coding/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question_id: questionId, code, email: localStorage.getItem('user_email') })
        });
        // rest of the logic
    }

    // Logout handler
    document.getElementById('logout-btn')?.addEventListener('click', () => {
        localStorage.clear();
        window.location.href = '/login';
    });
  </script>
</body>
</html>
